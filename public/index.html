<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard — 流量监控</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23111318'/><polyline points='14,46 24,30 34,38 44,18 54,28' fill='none' stroke='%2300d4aa' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111318;--bg2:#181b22;--bg3:#1e222c;--bg4:#252a36;
  --text:#d4dce8;--dim:#5a6478;--faint:#2a2e3a;
  --accent:#00d4aa;--accent-dim:#00a888;--accent-bg:rgba(0,212,170,.06);
  --blue:#4a9eff;--orange:#ff8c42;--rose:#ff5078;--purple:#8a6aff;
  --rule:rgba(212,220,232,.04);
  --shadow:0 1px 3px rgba(0,0,0,.2),0 8px 24px rgba(0,0,0,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.cn{font-family:'Noto Sans SC',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}

/* ═══ LAYOUT ═══ */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:240px;background:var(--bg2);border-right:1px solid var(--rule);
  padding:20px 0;display:flex;flex-direction:column;position:fixed;
  top:0;bottom:0;left:0;z-index:100;overflow-y:auto;
}
.main{margin-left:240px;flex:1;padding:28px 32px;min-height:100vh;}

@media(max-width:800px){
  .sidebar{display:none;}
  .main{margin-left:0;padding:20px 16px;}
  .mobile-header{display:flex !important;}
}

/* ═══ SIDEBAR ═══ */
.sb-logo{
  padding:0 20px 20px;border-bottom:1px solid var(--rule);
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.sb-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
.sb-logo span{font-weight:700;font-size:.88rem;}

.sb-section{padding:0 12px;margin-bottom:16px;}
.sb-section-title{
  font-size:.58rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--dim);padding:0 8px;margin-bottom:6px;
}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:8px;cursor:pointer;transition:all .15s;
  font-size:.82rem;color:var(--dim);
}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.sb-item.active{background:var(--accent-bg);color:var(--accent);}
.sb-item .sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-item .sb-count{
  margin-left:auto;font-family:'JetBrains Mono',monospace;
  font-size:.65rem;color:var(--dim);
}

/* ═══ MOBILE HEADER ═══ */
.mobile-header{
  display:none;align-items:center;gap:10px;
  padding:16px 0;margin-bottom:16px;border-bottom:1px solid var(--rule);
}
.mobile-header .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.mobile-header span{font-weight:700;font-size:.9rem;}

/* ═══ HEADER ═══ */
.dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.dash-header h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;}
.dash-header .sub{font-size:.8rem;color:var(--dim);}
.period-tabs{display:flex;gap:4px;}
.period-tab{
  font-size:.65rem;font-weight:500;padding:5px 12px;border-radius:6px;
  background:transparent;border:1px solid var(--faint);color:var(--dim);
  cursor:pointer;transition:all .15s;
}
.period-tab:hover{border-color:rgba(255,255,255,.1);color:var(--text);}
.period-tab.active{background:var(--accent-bg);border-color:rgba(0,212,170,.2);color:var(--accent);}

/* ═══ STAT CARDS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
@media(max-width:1000px){.stats-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.stats-row{grid-template-columns:1fr;}}

.stat-card{
  background:var(--bg2);border:1px solid var(--faint);border-radius:14px;
  padding:20px;
}
.stat-card .stat-label{font-size:.68rem;color:var(--dim);font-weight:500;letter-spacing:.04em;margin-bottom:4px;}
.stat-card .stat-value{
  font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:500;
  line-height:1.2;
}
.stat-card .stat-change{
  font-size:.68rem;font-weight:600;margin-top:4px;
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:4px;
}
.stat-change.up{color:var(--accent);background:rgba(0,212,170,.08);}
.stat-change.down{color:var(--rose);background:rgba(255,80,120,.08);}
.stat-change.flat{color:var(--dim);background:rgba(255,255,255,.04);}

/* ═══ CHART ═══ */
.chart-card{
  background:var(--bg2);border:1px solid var(--faint);border-radius:14px;
  padding:20px;margin-bottom:20px;
}
.chart-title{font-size:.82rem;font-weight:600;margin-bottom:4px;}
.chart-subtitle{font-size:.68rem;color:var(--dim);margin-bottom:16px;}
.chart-area{position:relative;height:200px;}
.chart-area canvas{display:block;width:100%;height:100%;}
.chart-area .no-data{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:.85rem;
}

/* ═══ TABLE CARDS ═══ */
.tables-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:800px){.tables-row{grid-template-columns:1fr;}}

.table-card{
  background:var(--bg2);border:1px solid var(--faint);border-radius:14px;
  padding:20px;overflow:hidden;
}
.table-card .tc-title{font-size:.82rem;font-weight:600;margin-bottom:4px;}
.table-card .tc-sub{font-size:.68rem;color:var(--dim);margin-bottom:14px;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{
  font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);padding:8px 0;border-bottom:1px solid var(--faint);text-align:left;
}
.data-table th:last-child{text-align:right;}
.data-table td{padding:8px 0;font-size:.82rem;border-bottom:1px solid var(--rule);}
.data-table td:last-child{text-align:right;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--dim);}
.data-table tr:last-child td{border-bottom:none;}
.bar-cell{display:flex;align-items:center;gap:8px;}
.mini-bar{height:4px;border-radius:2px;background:var(--accent);opacity:.4;transition:width .6s ease;}
.data-table tr:hover .mini-bar{opacity:.8;}

/* ═══ DEVICE PIE ═══ */
.pie-row{display:flex;gap:20px;align-items:center;margin-top:12px;}
.pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:.78rem;}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ═══ SETUP GUIDE ═══ */
.setup-card{
  background:var(--bg2);border:1px solid var(--faint);border-radius:14px;
  padding:24px;margin-top:24px;
}
.setup-card h3{font-size:1rem;font-weight:600;margin-bottom:4px;}
.setup-card .setup-sub{font-size:.78rem;color:var(--dim);margin-bottom:16px;}
.code-block{
  background:var(--bg);border:1px solid var(--faint);border-radius:8px;
  padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:.75rem;
  color:var(--accent);overflow-x:auto;line-height:1.7;position:relative;
}
.copy-btn{
  position:absolute;top:8px;right:8px;font-size:.6rem;font-weight:600;
  padding:4px 10px;border-radius:4px;border:1px solid var(--faint);
  background:var(--bg2);color:var(--dim);cursor:pointer;transition:all .2s;
}
.copy-btn:hover{color:var(--text);border-color:rgba(255,255,255,.1);}

/* ═══ EMPTY STATE ═══ */
.empty-state{
  text-align:center;padding:80px 20px;
}
.empty-state .icon{font-size:3rem;margin-bottom:16px;opacity:.3;}
.empty-state h2{font-size:1.2rem;font-weight:600;margin-bottom:8px;}
.empty-state p{font-size:.88rem;color:var(--dim);max-width:400px;margin:0 auto;}

/* ═══ SPARKLINE ═══ */
.sparkline{display:inline-block;vertical-align:middle;}

/* ═══ Loading ═══ */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--dim);}
.spinner{width:20px;height:20px;border:2px solid var(--faint);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="shell">

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo"><div class="dot"></div><span>Analytics</span></div>
  <div class="sb-section">
    <div class="sb-section-title">Overview 总览</div>
    <div class="sb-item active" data-project="" onclick="selectProject('')" style="cursor:pointer;">
      <div class="sb-dot" style="background:var(--accent);"></div>
      All Projects
    </div>
  </div>
  <div class="sb-section">
    <div class="sb-section-title">Projects 项目</div>
    <div id="sidebarProjects">
      <div class="sb-item" style="color:var(--dim);font-size:.75rem;padding:12px;">Loading...</div>
    </div>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="main">
  <div class="mobile-header"><div class="dot"></div><span>Analytics Dashboard</span></div>
  <div id="dashContent">
    <div class="loading"><div class="spinner"></div>Loading analytics data...</div>
  </div>

  <!-- SETUP GUIDE -->
  <div class="setup-card">
    <h3>Setup Guide &mdash; 安装指南</h3>
    <div class="setup-sub">Add this single line to any website's &lt;head&gt; to start tracking. 在任何网站的 &lt;head&gt; 中添加这一行即可开始追踪。</div>
    <div class="code-block" id="trackerCode">
      &lt;script defer src="<span id="trackerUrl">https://YOUR_DOMAIN/tracker.js</span>"&gt;&lt;/script&gt;
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
  </div>
</main>
</div>

<script>
const API_BASE = '';
const AUTH_KEY = new URLSearchParams(location.search).get('key') || '';
let currentProject = '';

// ── Project colors ──
const PROJECT_COLORS = [
  '#00d4aa','#4a9eff','#ff8c42','#ff5078','#8a6aff',
  '#e0c040','#00b4ff','#ff6b35','#5ac46a','#c46aaa'
];

function getProjectColor(idx) {
  return PROJECT_COLORS[idx % PROJECT_COLORS.length];
}

// ── Project metadata (GitHub + Vercel links) ──
const PROJECT_META = {
  'quantum-crypto-three':       { gh: 'gewenbo888/quantum-crypto',        vercel: 'quantum-crypto-three.vercel.app',      label: 'Quantum Crypto' },
  'tokendance':                 { gh: 'gewenbo888/TokenDance',            vercel: 'tokendance.vercel.app',                label: 'TokenDance' },
  'gosu-yu':                    { gh: 'gewenbo888/gosu-yu',               vercel: 'gosu-yu.vercel.app',                   label: 'Gosu Yu 戈苏御' },
  'three-regions':              { gh: 'gewenbo888/three-regions',         vercel: 'three-regions.vercel.app',             label: 'Three Regions' },
  'civilizations-compared':     { gh: 'gewenbo888/civilizations-compared',vercel: 'civilizations-compared.vercel.app',    label: 'Civilizations Compared' },
  'y-haplogroups':              { gh: 'gewenbo888/y-haplogroups',         vercel: 'y-haplogroups.vercel.app',             label: 'Y-Haplogroups' },
  'tao-science':                { gh: 'gewenbo888/tao-science',           vercel: 'tao-science.vercel.app',               label: 'Tao & Science' },
  'emerging-tech-nine':         { gh: 'gewenbo888/emerging-tech',         vercel: 'emerging-tech-nine.vercel.app',        label: 'Emerging Tech' },
  'ai-tools-guide-henna':       { gh: 'gewenbo888/ai-tools-guide',        vercel: 'ai-tools-guide-henna.vercel.app',      label: 'AI Tools Guide' },
  'island-gun-king':            { gh: 'gewenbo888/island-gun-king',       vercel: 'island-gun-king.vercel.app',           label: 'Island Gun King' },
  'prototype-indol-five':       { gh: 'gewenbo888/lonely-highway',        vercel: 'prototype-indol-five.vercel.app',      label: 'Lonely Highway' },
  'chinese-ai-researchers':     { gh: 'gewenbo888/chinese-ai-researchers',vercel: 'chinese-ai-researchers.vercel.app',    label: 'Chinese AI Researchers' },
  'agi-research-seven':         { gh: 'gewenbo888/agi-research',          vercel: 'agi-research-seven.vercel.app',        label: 'AGI Research' },
  'web-topaz-two-62':           { gh: 'gewenbo888/StringTheoryAI',        vercel: 'web-topaz-two-62.vercel.app',          label: 'StringTheoryAI' },
  'evolution-ai-six':           { gh: 'gewenbo888/EvolutionAI',           vercel: 'evolution-ai-six.vercel.app',          label: 'EvolutionAI' },
  'ai-insights-beta':           { gh: 'gewenbo888/ai-insights',           vercel: 'ai-insights-beta.vercel.app',          label: 'AI Insights' },
  'tech-levels':                { gh: 'gewenbo888/tech-levels',           vercel: 'tech-levels.vercel.app',               label: 'Tech Levels L1–L5' },
  'gewenbo-hub':                { gh: 'gewenbo888/gewenbo-hub',           vercel: 'gewenbo-hub.vercel.app',               label: 'Gewenbo Hub' },
  'gewenbo-links':              { gh: 'gewenbo888/gewenbo-links',         vercel: 'gewenbo-links.vercel.app',             label: 'Link in Bio' },
  'gewenbo-blog':               { gh: 'gewenbo888/gewenbo-blog',          vercel: 'gewenbo-blog.vercel.app',              label: 'Blog' },
  'gewenbo-store':              { gh: 'gewenbo888/gewenbo-store',         vercel: 'gewenbo-store.vercel.app',             label: 'Store' },
};

function getMeta(project) {
  return PROJECT_META[project] || null;
}

function projectLinks(project, style) {
  const m = getMeta(project);
  if (!m) return '';
  const s = style === 'inline'
    ? 'display:inline-flex;gap:8px;font-size:.68rem;'
    : 'display:flex;gap:10px;margin-top:8px;font-size:.72rem;';
  return `<div style="${s}">
    <a href="https://github.com/${m.gh}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--dim)'">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <a href="https://${m.vercel}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--dim)'">
      <svg width="13" height="13" viewBox="0 0 76 65" fill="currentColor"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z"/></svg>
      Live Site
    </a>
  </div>`;
}

// ── Set tracker URL ──
const origin = location.origin;
document.getElementById('trackerUrl').textContent = origin + '/tracker.js';
document.getElementById('trackerCode').querySelector('.copy-btn').setAttribute(
  'data-code', `<script defer src="${origin}/tracker.js"><\/script>`
);

function copyCode() {
  const code = `<script defer src="${origin}/tracker.js"><\/script>`;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ── Fetch data ──
async function fetchStats(project) {
  const params = new URLSearchParams();
  if (project) params.set('project', project);
  if (AUTH_KEY) params.set('key', AUTH_KEY);
  try {
    const res = await fetch(`${API_BASE}/api/stats?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('Fetch error:', err);
    return null;
  }
}

// ── Draw chart ──
function drawChart(canvasId, data, color = '#00d4aa') {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = W / 2, h = H / 2;
  ctx.clearRect(0, 0, w, h);

  if (!data || !data.length) return;

  const values = data.map(d => d.views || d.count || 0);
  const max = Math.max(...values, 1);
  const padT = 10, padB = 24, padL = 0, padR = 0;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Grid lines
  ctx.strokeStyle = 'rgba(212,220,232,.04)';
  ctx.lineWidth = .5;
  for (let i = 0; i <= 4; i++) {
    const y = padT + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
  }

  // Area fill
  const grad = ctx.createLinearGradient(0, padT, 0, h - padB);
  grad.addColorStop(0, color + '20');
  grad.addColorStop(1, color + '02');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(padL, h - padB);
  values.forEach((v, i) => {
    const x = padL + (i / (values.length - 1 || 1)) * plotW;
    const y = padT + plotH - (v / max) * plotH;
    if (i === 0) ctx.lineTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(padL + plotW, h - padB);
  ctx.closePath();
  ctx.fill();

  // Line
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = padL + (i / (values.length - 1 || 1)) * plotW;
    const y = padT + plotH - (v / max) * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // X labels (first, mid, last)
  ctx.fillStyle = '#5a6478';
  ctx.font = '500 9px DM Sans';
  ctx.textAlign = 'center';
  const labels = data.map(d => d.date || d.hour || '');
  if (labels[0]) {
    const fmt = (s) => s.slice(5).replace('T', ' ');
    ctx.fillText(fmt(labels[0]), padL + 20, h - 6);
    ctx.fillText(fmt(labels[Math.floor(labels.length / 2)]), w / 2, h - 6);
    ctx.textAlign = 'right';
    ctx.fillText(fmt(labels[labels.length - 1]), w - padR - 4, h - 6);
  }
}

// ── Sparkline SVG ──
function sparkline(values, color = '#00d4aa', w = 60, h = 20) {
  if (!values.length) return '';
  const max = Math.max(...values, 1);
  const points = values.map((v, i) => {
    const x = (i / (values.length - 1 || 1)) * w;
    const y = h - (v / max) * (h - 2) - 1;
    return `${x},${y}`;
  }).join(' ');
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

// ── Format number ──
function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

// ── Change indicator ──
function change(today, yesterday) {
  if (yesterday === 0 && today === 0) return '<span class="stat-change flat">&mdash; no data</span>';
  if (yesterday === 0) return '<span class="stat-change up">&uarr; new</span>';
  const pct = Math.round(((today - yesterday) / yesterday) * 100);
  if (pct > 0) return `<span class="stat-change up">&uarr; ${pct}%</span>`;
  if (pct < 0) return `<span class="stat-change down">&darr; ${Math.abs(pct)}%</span>`;
  return '<span class="stat-change flat">&mdash; 0%</span>';
}

// ── Render Overview ──
function renderOverview(data) {
  if (!data || !data.projects || !data.projects.length) {
    return `<div class="empty-state">
      <div class="icon">&#128202;</div>
      <h2>No Data Yet 暂无数据</h2>
      <p>Add the tracking script to your websites to start collecting analytics data.
      <br><span class="cn" style="color:var(--dim);font-size:.82rem;">在你的网站中添加追踪脚本以开始收集分析数据。</span></p>
    </div>`;
  }

  const totalViews = data.projects.reduce((s, p) => s + p.total, 0);
  const todayViews = data.projects.reduce((s, p) => s + p.today, 0);
  const yesterdayViews = data.projects.reduce((s, p) => s + p.yesterday, 0);

  let html = `
    <div class="dash-header">
      <div><h1>All Projects 所有项目</h1><div class="sub">${data.totalProjects} projects tracked</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Pageviews 总浏览量</div>
        <div class="stat-value">${fmt(totalViews)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today 今日</div>
        <div class="stat-value">${fmt(todayViews)}</div>
        ${change(todayViews, yesterdayViews)}
      </div>
      <div class="stat-card">
        <div class="stat-label">Yesterday 昨日</div>
        <div class="stat-value">${fmt(yesterdayViews)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Projects 项目数</div>
        <div class="stat-value">${data.totalProjects}</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Global Pageviews &mdash; Last 7 Days</div>
      <div class="chart-subtitle">全局浏览量 — 最近7天</div>
      <div class="chart-area"><canvas id="globalChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Projects 项目列表</div>
      <div class="chart-subtitle">Click any project for detailed analytics 点击任意项目查看详细分析</div>
      <table class="data-table">
        <thead><tr><th>Project</th><th>7-Day Trend</th><th>Links 链接</th><th>Today</th><th>Total</th></tr></thead>
        <tbody>`;

  data.projects.forEach((p, i) => {
    const vals = p.last7.map(d => d.views);
    const m = getMeta(p.project);
    const label = m ? m.label : p.project;
    const links = m
      ? `<a href="https://github.com/${m.gh}" target="_blank" rel="noopener" title="GitHub" style="color:var(--dim);transition:color .15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--dim)'"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>&nbsp;&nbsp;<a href="https://${m.vercel}" target="_blank" rel="noopener" title="Live Site" style="color:var(--dim);transition:color .15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--dim)'"><svg width="13" height="13" viewBox="0 0 76 65" fill="currentColor"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z"/></svg></a>`
      : '';
    html += `<tr style="cursor:pointer" onclick="selectProject('${p.project}')">
      <td><div class="bar-cell"><div class="pie-dot" style="background:${getProjectColor(i)}"></div>${label}</div></td>
      <td>${sparkline(vals, getProjectColor(i))}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap;">${links}</td>
      <td>${fmt(p.today)}</td>
      <td>${fmt(p.total)}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}

// ── Render Project Detail ──
function renderProject(data) {
  if (!data) return '<div class="empty-state"><div class="icon">&#128683;</div><h2>Error loading data</h2></div>';

  const yesterdayViews = data.daily.length >= 2 ? data.daily[data.daily.length - 2].views : 0;

  const meta = getMeta(data.project);
  const detailLabel = meta ? meta.label : data.project;

  let html = `
    <div class="dash-header">
      <div>
        <h1>${detailLabel}</h1>
        <div class="sub" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <a href="#" onclick="selectProject('');return false;" style="color:var(--accent);text-decoration:none;">&larr; All Projects</a>
          ${meta ? `<a href="https://github.com/${meta.gh}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-size:.75rem;transition:color .2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--dim)'"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> GitHub</a>` : ''}
          ${meta ? `<a href="https://${meta.vercel}" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-size:.75rem;transition:color .2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--dim)'"><svg width="12" height="12" viewBox="0 0 76 65" fill="currentColor"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z"/></svg> Live Site</a>` : ''}
        </div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Pageviews 总浏览量</div>
        <div class="stat-value">${fmt(data.total)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today 今日</div>
        <div class="stat-value">${fmt(data.today)}</div>
        ${change(data.today, yesterdayViews)}
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Page 热门页面</div>
        <div class="stat-value" style="font-size:1rem;">${data.pages.length ? data.pages[0].name : '/'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Source 主要来源</div>
        <div class="stat-value" style="font-size:1rem;">${data.referrers.length ? data.referrers[0].name : 'direct'}</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Daily Pageviews &mdash; Last 30 Days</div>
      <div class="chart-subtitle">每日浏览量 — 最近30天</div>
      <div class="chart-area"><canvas id="dailyChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Hourly Pageviews &mdash; Last 48 Hours</div>
      <div class="chart-subtitle">每小时浏览量 — 最近48小时</div>
      <div class="chart-area"><canvas id="hourlyChart"></canvas></div>
    </div>

    <div class="tables-row">
      <div class="table-card">
        <div class="tc-title">Top Pages 热门页面</div>
        <div class="tc-sub">Most visited paths</div>
        <table class="data-table"><thead><tr><th>Path</th><th>Views</th></tr></thead><tbody>`;

  const maxPage = data.pages.length ? data.pages[0].count : 1;
  data.pages.slice(0, 10).forEach(p => {
    html += `<tr><td><div class="bar-cell"><div class="mini-bar" style="width:${(p.count/maxPage)*60}px;"></div>${p.name}</div></td><td>${fmt(p.count)}</td></tr>`;
  });

  html += `</tbody></table></div>
      <div class="table-card">
        <div class="tc-title">Traffic Sources 流量来源</div>
        <div class="tc-sub">Where visitors come from</div>
        <table class="data-table"><thead><tr><th>Source</th><th>Views</th></tr></thead><tbody>`;

  const maxRef = data.referrers.length ? data.referrers[0].count : 1;
  data.referrers.slice(0, 10).forEach(r => {
    html += `<tr><td><div class="bar-cell"><div class="mini-bar" style="width:${(r.count/maxRef)*60}px;background:var(--blue);"></div>${r.name}</div></td><td>${fmt(r.count)}</td></tr>`;
  });

  html += `</tbody></table></div></div>
    <div class="tables-row">
      <div class="table-card">
        <div class="tc-title">Countries 国家/地区</div>
        <div class="tc-sub">Geographic distribution</div>
        <table class="data-table"><thead><tr><th>Country</th><th>Views</th></tr></thead><tbody>`;

  const maxGeo = data.countries.length ? data.countries[0].count : 1;
  data.countries.slice(0, 10).forEach(c => {
    html += `<tr><td><div class="bar-cell"><div class="mini-bar" style="width:${(c.count/maxGeo)*60}px;background:var(--orange);"></div>${c.name}</div></td><td>${fmt(c.count)}</td></tr>`;
  });

  html += `</tbody></table></div>
      <div class="table-card">
        <div class="tc-title">Devices 设备</div>
        <div class="tc-sub">Device breakdown</div>
        <div class="pie-row"><div class="pie-legend">`;

  const deviceColors = { desktop: '#00d4aa', tablet: '#4a9eff', mobile: '#ff8c42' };
  const totalDevices = data.devices.reduce((s, d) => s + d.count, 0) || 1;
  data.devices.forEach(d => {
    const pct = Math.round((d.count / totalDevices) * 100);
    html += `<div class="pie-legend-item"><div class="pie-dot" style="background:${deviceColors[d.name] || '#8a6aff'}"></div>${d.name} <span class="mono" style="color:var(--dim);font-size:.7rem;margin-left:auto;">${pct}%</span></div>`;
  });

  html += `</div></div></div></div>`;
  return html;
}

// ── Select project ──
async function selectProject(project) {
  currentProject = project;
  const content = document.getElementById('dashContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

  // Update sidebar active
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.dataset.project === project);
  });

  const data = await fetchStats(project || undefined);

  if (!project) {
    content.innerHTML = renderOverview(data);
    setTimeout(() => {
      if (data && data.globalDaily) drawChart('globalChart', data.globalDaily);
    }, 50);
  } else {
    content.innerHTML = renderProject(data);
    setTimeout(() => {
      if (data) {
        drawChart('dailyChart', data.daily);
        drawChart('hourlyChart', data.hourly, '#4a9eff');
      }
    }, 50);
  }
}
window.selectProject = selectProject;

// ── Init ──
async function init() {
  const data = await fetchStats();

  // Populate sidebar
  const container = document.getElementById('sidebarProjects');
  if (data && data.projects && data.projects.length) {
    container.innerHTML = data.projects.map((p, i) => {
      const m = getMeta(p.project);
      const label = m ? m.label : p.project;
      return `<div class="sb-item" data-project="${p.project}" onclick="selectProject('${p.project}')">
        <div class="sb-dot" style="background:${getProjectColor(i)}"></div>
        ${label}
        <span class="sb-count">${fmt(p.total)}</span>
      </div>`;
    }).join('');
  } else {
    container.innerHTML = '<div class="sb-item" style="color:var(--dim);font-size:.75rem;">No projects yet</div>';
  }

  // Render overview
  const content = document.getElementById('dashContent');
  content.innerHTML = renderOverview(data);
  setTimeout(() => {
    if (data && data.globalDaily) drawChart('globalChart', data.globalDaily);
  }, 50);
}

init();
</script>
</body>
</html>
